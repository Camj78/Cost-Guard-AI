name: CostGuardAI PR Comment

on:
  pull_request:

jobs:
  costguard-comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run CostGuardAI
        id: costguard
        run: npx @camj78/costguardai@latest ci --fail-on-risk 70 --format json > result.json
        continue-on-error: true

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('result.json', 'utf8'));

            const files = Array.isArray(data.files) ? data.files : [];

            const highestRiskFile = files.reduce((max, f) => {
              return (f.risk_score ?? 0) > (max.risk_score ?? 0) ? f : max;
            }, files[0] || {});

            const riskScore = highestRiskFile.risk_score ?? 0;
            const safetyScore = 100 - riskScore;
            const fileName = highestRiskFile.file || 'unknown';
            const riskDrivers = Array.isArray(highestRiskFile.risk_drivers)
              ? highestRiskFile.risk_drivers
              : [];

            const driversText = riskDrivers.length > 0
              ? riskDrivers.map(r => "- " + r).join("\n")
              : "- None identified";

            const body =
              "## CostGuardAI Safety Report\n\n" +
              "**File:** `" + fileName + "`\n" +
              "**Safety Score:** " + safetyScore + "/100 (100 - risk score of " + riskScore + ")\n\n" +
              "**Risk Drivers:**\n" +
              driversText + "\n\n" +
              "---\n" +
              "Add CostGuardAI to your CI pipeline:\n\n" +
              "```yaml\n" +
              "- uses: Camj78/costguardai-action@v1\n" +
              "```";

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
