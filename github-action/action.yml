name: 'CostGuard Prompt Scan'
description: 'Scan repository prompt files for AI cost and risk. Blocks builds when risk score exceeds threshold.'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  api_key:
    description: 'CostGuard API key. Get one at https://costguardai.io'
    required: true
  path:
    description: 'Directory to scan for prompt files (relative to workspace root). Defaults to repo root.'
    required: false
    default: '.'
  risk_threshold:
    description: 'Risk score threshold 0–100. Build fails if any scanned prompt exceeds this value.'
    required: false
    default: '70'

outputs:
  highest_risk_score:
    description: 'Highest risk score found across all scanned prompts.'
  scanned_files:
    description: 'Total number of files scanned.'
  blocked:
    description: '"true" if any prompt exceeded the threshold, "false" otherwise.'

runs:
  using: 'node20'
  main: 'scan.js'
