name: 'CostGuard Prompt Scan'
description: 'Scan repository prompt files for AI cost and safety risk. Blocks builds when Safety Score falls below threshold.'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  api_key:
    description: 'CostGuard API key. Get one at https://costguardai.io'
    required: true
  path:
    description: 'Directory to scan for prompt files (relative to workspace root). Defaults to repo root.'
    required: false
    default: '.'
  risk_threshold:
    description: 'Minimum acceptable Safety Score (0–100). Build fails if any scanned prompt Safety Score falls below this value.'
    required: false
    default: '70'

outputs:
  lowest_safety_score:
    description: 'Lowest Safety Score found across all scanned prompts. Lower scores indicate higher risk.'
  scanned_files:
    description: 'Total number of files scanned.'
  blocked:
    description: '"true" if any prompt Safety Score fell below the threshold, "false" otherwise.'

runs:
  using: 'node20'
  main: 'scan.js'
