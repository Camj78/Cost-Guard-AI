# CostGuard Prompt Scan — Threshold-blocking example
#
# Blocks the pull request merge if any prompt's Safety Score falls below the threshold.
# The build exits with code 1 and the PR comment shows which files failed.
#
# Required secret:
#   COSTGUARD_API_KEY — generate at costguardai.io/settings/api-keys
#
# Required permission:
#   pull-requests: write — to post and update the scan summary comment

name: CostGuard Prompt Scan

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  prompt-scan:
    name: Prompt Safety Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: costguardai/prompt-scan@v1
        with:
          api_key: ${{ secrets.COSTGUARD_API_KEY }}
          # Block the build if any prompt's Safety Score falls below 30 (0–100 scale).
          # Raise this value for stricter enforcement.
          risk_threshold: 70

      # Optional: use scan outputs in downstream steps
      # - name: Print scan summary
      #   run: |
      #     echo "Lowest Safety Score: ${{ steps.scan.outputs.lowest_safety_score }}"
      #     echo "Files scanned:       ${{ steps.scan.outputs.scanned_files }}"
      #     echo "Blocked:             ${{ steps.scan.outputs.blocked }}"
