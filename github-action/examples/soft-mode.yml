# CostGuard Prompt Scan — Soft mode (report only, never blocks)
#
# Posts a PR comment with the full risk report on every push but never fails
# the build, regardless of the risk score. Use this when rolling out CostGuard
# to an existing repo without immediately enforcing thresholds.
#
# To switch to enforcing mode: change risk_threshold to a value below 100.
#
# Required secret:
#   COSTGUARD_API_KEY — generate at costguardai.io/settings/api-keys
#
# Required permission:
#   pull-requests: write — to post and update the scan summary comment

name: CostGuard Prompt Scan (Soft Mode)

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  prompt-scan:
    name: Prompt Risk Report
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: costguardai/prompt-scan@v1
        id: scan
        with:
          api_key: ${{ secrets.COSTGUARD_API_KEY }}
          # Setting threshold to 100 means no prompt can ever exceed it.
          # The PR comment is always posted; the build always exits 0.
          risk_threshold: 100

      # Log the result even in soft mode so you can track drift over time.
      - name: Report risk score
        run: |
          echo "Highest risk score: ${{ steps.scan.outputs.highest_risk_score }}"
          echo "Files scanned:      ${{ steps.scan.outputs.scanned_files }}"
